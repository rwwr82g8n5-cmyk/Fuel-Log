<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fuel Log — Calorie Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e0c;
    --surface: #1a1916;
    --surface2: #232220;
    --border: #2e2c29;
    --text: #f0ece3;
    --text-muted: #7a7670;
    --text-dim: #4a4845;
    --accent: #e8c547;
    --accent-dim: rgba(232, 197, 71, 0.12);
    --accent-glow: rgba(232, 197, 71, 0.25);
    --green: #6fcf6f;
    --green-dim: rgba(111, 207, 111, 0.12);
    --orange: #f0a050;
    --orange-dim: rgba(240, 160, 80, 0.12);
    --red: #e06060;
    --red-dim: rgba(224, 96, 96, 0.12);
    --goal: 1800;
    --radius: 14px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.5;
  }

  /* ── HEADER ── */
  header {
    padding: 28px 20px 0;
    max-width: 520px;
    margin: 0 auto;
  }

  .wordmark {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    letter-spacing: -0.3px;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .wordmark span { color: var(--text-muted); font-size: 13px; font-family: 'DM Mono', monospace; font-style: italic; }

  /* ── DATE NAV ── */
  .date-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 24px;
    padding: 0 2px;
  }

  .date-nav button {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-muted);
    width: 36px; height: 36px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .date-nav button:hover { border-color: var(--accent); color: var(--accent); }

  .date-display {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    text-align: center;
  }
  .date-display .sub {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    display: block;
    text-align: center;
    margin-top: 2px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  /* ── RING SUMMARY ── */
  .summary-card {
    max-width: 520px;
    margin: 20px auto 0;
    padding: 0 20px;
  }

  .ring-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px 24px;
    display: flex;
    align-items: center;
    gap: 24px;
  }

  .ring-wrap {
    position: relative;
    flex-shrink: 0;
    width: 100px; height: 100px;
  }

  .ring-wrap svg { transform: rotate(-90deg); }

  .ring-bg { fill: none; stroke: var(--surface2); stroke-width: 8; }
  .ring-fill {
    fill: none;
    stroke-width: 8;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.6s cubic-bezier(.4,0,.2,1), stroke 0.3s;
  }

  .ring-center {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
  }

  .ring-center .kcal {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    line-height: 1;
    display: block;
  }

  .ring-center .kcal-label {
    font-size: 10px;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .ring-stats {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .stat-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }

  .stat-label {
    font-size: 12px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-family: 'DM Mono', monospace;
  }

  .stat-value {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
  }

  .stat-value.remaining { color: var(--green); }
  .stat-value.over { color: var(--red); }
  .stat-value.warning { color: var(--orange); }

  .warning-banner {
    margin-top: 14px;
    padding: 10px 14px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    display: none;
    gap: 8px;
    align-items: flex-start;
  }
  .warning-banner.show { display: flex; }
  .warning-banner.warn { background: var(--orange-dim); border: 1px solid rgba(240,160,80,0.3); color: var(--orange); }
  .warning-banner.over { background: var(--red-dim); border: 1px solid rgba(224,96,96,0.3); color: var(--red); }

  /* ── INPUT ── */
  .input-area {
    max-width: 520px;
    margin: 20px auto 0;
    padding: 0 20px;
  }

  .input-label {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    font-family: 'DM Mono', monospace;
    margin-bottom: 8px;
  }

  .input-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    transition: border-color 0.2s;
  }
  .input-box:focus-within { border-color: var(--accent); }

  .meal-textarea {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    line-height: 1.6;
    resize: none;
    min-height: 72px;
  }
  .meal-textarea::placeholder { color: var(--text-dim); }

  .input-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 10px;
  }

  .char-hint { font-size: 11px; color: var(--text-dim); font-family: 'DM Mono', monospace; }

  .log-btn {
    background: var(--accent);
    color: #0f0e0c;
    border: none;
    border-radius: var(--radius-sm);
    padding: 10px 20px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .log-btn:hover { background: #f0d060; transform: translateY(-1px); }
  .log-btn:active { transform: translateY(0); }
  .log-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .log-btn .spinner {
    width: 14px; height: 14px;
    border: 2px solid rgba(0,0,0,0.2);
    border-top-color: #000;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    display: none;
  }
  .log-btn.loading .spinner { display: block; }
  .log-btn.loading .btn-text { display: none; }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── MEAL LOG ── */
  .log-section {
    max-width: 520px;
    margin: 28px auto 0;
    padding: 0 20px 40px;
  }

  .log-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }

  .log-title {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    font-family: 'DM Mono', monospace;
  }

  .clear-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    border-radius: var(--radius-sm);
    padding: 4px 10px;
    font-size: 11px;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    transition: all 0.15s;
  }
  .clear-btn:hover { border-color: var(--red); color: var(--red); }

  .meal-entry {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 10px;
    overflow: hidden;
    animation: slideIn 0.3s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .meal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 16px;
    cursor: pointer;
    gap: 12px;
  }

  .meal-time {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    flex-shrink: 0;
  }

  .meal-desc {
    font-size: 14px;
    color: var(--text);
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .meal-total-kcal {
    font-family: 'DM Serif Display', serif;
    font-size: 18px;
    color: var(--accent);
    flex-shrink: 0;
  }

  .meal-toggle {
    color: var(--text-dim);
    font-size: 12px;
    flex-shrink: 0;
    transition: transform 0.2s;
  }
  .meal-toggle.open { transform: rotate(180deg); }

  .meal-breakdown {
    padding: 0 16px 14px;
    display: none;
  }
  .meal-breakdown.open { display: block; }

  .breakdown-table {
    width: 100%;
    border-collapse: collapse;
  }

  .breakdown-table th {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 6px 0;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }
  .breakdown-table th:last-child { text-align: right; }

  .breakdown-table td {
    padding: 8px 0;
    font-size: 13px;
    border-bottom: 1px solid var(--border);
    color: var(--text);
  }
  .breakdown-table td:last-child {
    text-align: right;
    font-family: 'DM Mono', monospace;
    color: var(--text-muted);
  }
  .breakdown-table tr:last-child td { border-bottom: none; }

  .ingredient-portion {
    font-size: 11px;
    color: var(--text-muted);
    display: block;
    margin-top: 1px;
    font-family: 'DM Mono', monospace;
  }

  .meal-delete {
    margin-top: 10px;
    display: flex;
    justify-content: flex-end;
  }
  .meal-delete button {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    border-radius: var(--radius-sm);
    padding: 4px 10px;
    font-size: 11px;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    transition: all 0.15s;
  }
  .meal-delete button:hover { border-color: var(--red); color: var(--red); }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-dim);
  }
  .empty-state .icon { font-size: 32px; margin-bottom: 10px; }
  .empty-state p { font-size: 14px; }

  .error-msg {
    background: var(--red-dim);
    border: 1px solid rgba(224,96,96,0.3);
    color: var(--red);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    font-size: 13px;
    margin-top: 10px;
    display: none;
  }
  .error-msg.show { display: block; }

  /* scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>

<header>
  <div class="wordmark">Fuel Log <span>/ daily tracker</span></div>
</header>

<div class="date-nav" style="max-width:520px;margin:0 auto;padding:0 20px;margin-top:20px;">
  <button id="prevDay" title="Previous day">&#8592;</button>
  <div class="date-display">
    <span id="dateLabel">Today</span>
    <span class="sub" id="dateSub"></span>
  </div>
  <button id="nextDay" title="Next day">&#8594;</button>
</div>

<div class="summary-card">
  <div class="ring-container">
    <div class="ring-wrap">
      <svg viewBox="0 0 100 100" width="100" height="100">
        <circle class="ring-bg" cx="50" cy="50" r="42"/>
        <circle class="ring-fill" id="ringFill" cx="50" cy="50" r="42"
          stroke-dasharray="263.9"
          stroke-dashoffset="263.9"
          stroke="var(--green)"/>
      </svg>
      <div class="ring-center">
        <span class="kcal" id="consumedKcal">0</span>
        <span class="kcal-label">kcal</span>
      </div>
    </div>
    <div class="ring-stats">
      <div class="stat-row">
        <span class="stat-label">Goal</span>
        <span class="stat-value" style="color:var(--text-muted)">1,800</span>
      </div>
      <div class="stat-row">
        <span class="stat-label" id="remainLabel">Remaining</span>
        <span class="stat-value remaining" id="remainValue">1,600</span>
      </div>
    </div>
  </div>
  <div class="warning-banner" id="warnBanner">
    <span>⚠</span>
    <span id="warnText"></span>
  </div>
</div>

<div class="input-area">
  <div class="input-label">Log a meal</div>
  <div class="input-box">
    <textarea class="meal-textarea" id="mealInput" placeholder="e.g. I had scrambled eggs with two slices of toast and a glass of orange juice…" rows="3"></textarea>
    <div class="input-footer">
      <span class="char-hint">describe what you ate, naturally</span>
      <button class="log-btn" id="logBtn" onclick="logMeal()">
        <span class="spinner"></span>
        <span class="btn-text">↑ Log</span>
      </button>
    </div>
  </div>
  <div class="error-msg" id="errorMsg"></div>
</div>

<div class="log-section">
  <div class="log-header">
    <span class="log-title" id="logTitle">Today's meals</span>
    <button class="clear-btn" onclick="clearDay()">Clear day</button>
  </div>
  <div id="mealLog"></div>
</div>

<script>
const GOAL = 1800;
const CIRCUMFERENCE = 2 * Math.PI * 42; // 263.8

let currentOffset = 0; // 0 = today, -1 = yesterday, etc.
let allData = {}; // { "YYYY-MM-DD": [meals] }

// ── Storage ──
function getKey(offset) {
  const d = new Date();
  d.setDate(d.getDate() + offset);
  return d.toISOString().split('T')[0];
}

function load() {
  try { allData = JSON.parse(localStorage.getItem('fuellog_v2') || '{}'); }
  catch { allData = {}; }
}

function save() {
  localStorage.setItem('fuellog_v2', JSON.stringify(allData));
}

function getMeals(key) { return allData[key] || []; }

// ── Date display ──
function formatDate(offset) {
  const d = new Date();
  d.setDate(d.getDate() + offset);
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  if (offset === 0) return { label: 'Today', sub: `${days[d.getDay()]} ${d.getDate()} ${months[d.getMonth()]}` };
  if (offset === -1) return { label: 'Yesterday', sub: `${days[d.getDay()]} ${d.getDate()} ${months[d.getMonth()]}` };
  return { label: `${days[d.getDay()]} ${d.getDate()} ${months[d.getMonth()]}`, sub: d.getFullYear() + '' };
}

// ── UI update ──
function render() {
  const key = getKey(currentOffset);
  const { label, sub } = formatDate(currentOffset);
  document.getElementById('dateLabel').textContent = label;
  document.getElementById('dateSub').textContent = sub;
  document.getElementById('logTitle').textContent = currentOffset === 0 ? "Today's meals" : `${label}'s meals`;

  const meals = getMeals(key);
  const total = meals.reduce((s, m) => s + m.total, 0);
  const remaining = GOAL - total;

  document.getElementById('consumedKcal').textContent = total.toLocaleString();

  // Ring
  const pct = Math.min(total / GOAL, 1);
  const offset = CIRCUMFERENCE - pct * CIRCUMFERENCE;
  const ring = document.getElementById('ringFill');
  ring.style.strokeDashoffset = offset;
  ring.style.stroke = total > GOAL ? 'var(--red)' : total > GOAL * 0.85 ? 'var(--orange)' : 'var(--green)';

  // Remaining
  const remEl = document.getElementById('remainValue');
  const remLabel = document.getElementById('remainLabel');
  if (remaining < 0) {
    remEl.textContent = `+${Math.abs(remaining).toLocaleString()}`;
    remEl.className = 'stat-value over';
    remLabel.textContent = 'Over goal';
  } else {
    remEl.textContent = remaining.toLocaleString();
    remEl.className = remaining < 200 ? 'stat-value warning' : 'stat-value remaining';
    remLabel.textContent = 'Remaining';
  }

  // Warning banner
  const banner = document.getElementById('warnBanner');
  const warnText = document.getElementById('warnText');
  if (total > GOAL) {
    banner.className = 'warning-banner show over';
    warnText.textContent = `You're ${(total - GOAL).toLocaleString()} kcal over your daily goal. Consider a lighter next meal.`;
  } else if (total > GOAL * 0.85) {
    banner.className = 'warning-banner show warn';
    warnText.textContent = `You've used ${Math.round(total/GOAL*100)}% of your goal. Only ${remaining.toLocaleString()} kcal left today.`;
  } else {
    banner.className = 'warning-banner';
  }

  // Meal list
  const log = document.getElementById('mealLog');
  if (meals.length === 0) {
    log.innerHTML = `<div class="empty-state"><div class="icon">🍽</div><p>No meals logged for this day yet.</p></div>`;
    return;
  }

  log.innerHTML = meals.map((meal, idx) => `
    <div class="meal-entry" id="meal-${idx}">
      <div class="meal-header" onclick="toggleBreakdown(${idx})">
        <span class="meal-time">${meal.time}</span>
        <span class="meal-desc">${escHtml(meal.description)}</span>
        <span class="meal-total-kcal">${meal.total.toLocaleString()}</span>
        <span class="meal-toggle" id="toggle-${idx}">▼</span>
      </div>
      <div class="meal-breakdown" id="breakdown-${idx}">
        <table class="breakdown-table">
          <thead>
            <tr>
              <th>Ingredient</th>
              <th>kcal</th>
            </tr>
          </thead>
          <tbody>
            ${meal.ingredients.map(ing => `
              <tr>
                <td>
                  ${escHtml(ing.name)}
                  <span class="ingredient-portion">${escHtml(ing.portion)}</span>
                </td>
                <td>${ing.calories}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
        <div class="meal-delete">
          <button onclick="deleteMeal(${idx})">Remove meal</button>
        </div>
      </div>
    </div>
  `).join('');
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toggleBreakdown(idx) {
  const bd = document.getElementById(`breakdown-${idx}`);
  const tog = document.getElementById(`toggle-${idx}`);
  bd.classList.toggle('open');
  tog.classList.toggle('open');
}

function deleteMeal(idx) {
  const key = getKey(currentOffset);
  allData[key].splice(idx, 1);
  save();
  render();
}

function clearDay() {
  if (!confirm('Clear all meals for this day?')) return;
  const key = getKey(currentOffset);
  allData[key] = [];
  save();
  render();
}

// ── Nav ──
document.getElementById('prevDay').onclick = () => { currentOffset--; render(); };
document.getElementById('nextDay').onclick = () => {
  if (currentOffset < 0) { currentOffset++; render(); }
};

// ── Log meal via Claude ──
async function logMeal() {
  const input = document.getElementById('mealInput').value.trim();
  if (!input) return;

  const btn = document.getElementById('logBtn');
  const errEl = document.getElementById('errorMsg');
  btn.disabled = true;
  btn.classList.add('loading');
  errEl.classList.remove('show');

  const systemPrompt = `You are a nutrition assistant. The user describes a meal in natural language.
Your job: identify each food ingredient, estimate a realistic portion size based on context, and calculate calories.

Respond ONLY with a valid JSON object — no markdown, no explanation, nothing else. Format:
{
  "summary": "brief meal name like 'Salad with eggs' (max 40 chars)",
  "ingredients": [
    { "name": "Ingredient name", "portion": "e.g. 2 medium eggs (100g)", "calories": 155 }
  ],
  "total": 540
}

Rules:
- Use realistic average portion sizes for home cooking
- Be accurate with calorie estimates (use standard nutritional data)
- total must equal the sum of all ingredient calories
- Keep ingredient names clean and concise`;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        system: systemPrompt,
        messages: [{ role: "user", content: input }]
      })
    });

    if (!response.ok) throw new Error(`API error ${response.status}`);
    const data = await response.json();
    const raw = data.content.find(b => b.type === 'text')?.text || '';
    
    // Strip possible markdown fences
    const cleaned = raw.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(cleaned);

    // Validate
    if (!parsed.ingredients || !Array.isArray(parsed.ingredients) || typeof parsed.total !== 'number') {
      throw new Error('Unexpected response format');
    }

    const key = getKey(currentOffset);
    if (!allData[key]) allData[key] = [];

    const now = new Date();
    const timeStr = now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });

    allData[key].push({
      description: parsed.summary || input.slice(0, 60),
      time: timeStr,
      total: Math.round(parsed.total),
      ingredients: parsed.ingredients.map(i => ({
        name: i.name,
        portion: i.portion,
        calories: Math.round(i.calories)
      }))
    });

    save();
    document.getElementById('mealInput').value = '';
    render();

    // Auto-expand the newest meal
    setTimeout(() => {
      const meals = getMeals(key);
      const lastIdx = meals.length - 1;
      toggleBreakdown(lastIdx);
    }, 100);

  } catch (err) {
    console.error(err);
    let msg = 'Something went wrong. Check your connection and try again.';
    if (err.message.includes('JSON')) msg = 'Could not parse meal data. Try describing your meal more specifically.';
    if (err.message.includes('401') || err.message.includes('403')) msg = 'API key error. Make sure you\'re running this through Claude.ai.';
    errEl.textContent = msg;
    errEl.classList.add('show');
  } finally {
    btn.disabled = false;
    btn.classList.remove('loading');
  }
}

// Enter to submit (Shift+Enter for newline)
document.getElementById('mealInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    logMeal();
  }
});

// ── Init ──
load();
render();
</script>
</body>
